events {}
http {
    include /etc/nginx/mime.types;
    types {
        application/javascript mjs;
    }
    server {
        listen 443 ssl http2;
        server_name resumefire.io www.resumefire.io;

        ssl_certificate /etc/nginx/ssl/resumefire.io.pem;
        ssl_certificate_key /etc/nginx/ssl/resumefire.key.key;

        location / {
            try_files $uri $uri/ /index.html; # Essential for Angular routing
        }

        # Proxy API requests to the Go backend service name defined in Docker Compose
        location /api/ {
            proxy_pass http://backend:8080/api/; 
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 80;
        server_name resumefire.io www.resumefire.io;
        return 301 https://$host$request_uri;
    }
}

